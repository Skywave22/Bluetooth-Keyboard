name: Build BluePilot Remote v3

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Test, lint and build APKs
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Check Gradle wrapper
        run: |
          test -f gradle/wrapper/gradle-wrapper.jar
          ./gradlew --version --no-daemon

      # Auto-increment versionCode using the CI run number (base 300 + run).
      - name: Auto version
        run: |
          NEW_CODE=$((300 + ${{ github.run_number }}))
          sed -i "s/versionCode = 300/versionCode = ${NEW_CODE}/" app/build.gradle.kts
          echo "versionCode set to ${NEW_CODE}"

      # Optional real release signing. Add these repository secrets to enable:
      #   RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD,
      #   RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
      # Without them the release APK is signed with the debug key (still installable).
      - name: Decode release keystore (if configured)
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "RELEASE_KEYSTORE_FILE=${{ github.workspace }}/release.keystore" >> "$GITHUB_ENV"
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon || true

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Collect APKs
        if: success()
        run: |
          mkdir -p apks
          cp app/build/outputs/apk/debug/app-debug.apk apks/BluePilot-Remote-v3-debug.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk apks/BluePilot-Remote-v3-release.apk
          fi
          ls -lh apks

      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BluePilot-Remote-v3-APKs
          path: apks/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish APKs to Releases
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3-build-${{ github.run_number }}
          name: BluePilot Remote v3 (build ${{ github.run_number }})
          body: |
            Automated CI build of **BluePilot Remote v3** (versionCode ${{ github.run_number }} + 300).

            **Downloads**
            - `BluePilot-Remote-v3-debug.apk` — debug build.
            - `BluePilot-Remote-v3-release.apk` — release build (real key if secrets configured, CI debug key otherwise; both install directly).

            **Requires:** Android 10+ and a phone/ROM supporting Bluetooth HID Device mode.
          files: apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
          if-no-files-found: ignore
